services:
  - type: web
    name: sikapa-backend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
      - key: SECRET_KEY
      - key: TOTP_ENCRYPTION_KEY
      - key: CORS_ORIGINS
      - key: CORS_ALLOW_CREDENTIALS
      - key: FRONTEND_URL
      - key: REDIS_URL
      - key: USE_CELERY
        value: false
      - key: HTTPS_ENABLED
        value: false
      - key: DEBUG
        value: false
      - key: UPLOAD_SERVE_LOCAL
        value: false
