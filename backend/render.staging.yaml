# Render Blueprint — STAGING API (branch: dev/staging)
#
# Create a SECOND Web Service in Render from this file (do not replace production).
# Dashboard: New → Blueprint → repo root, set Blueprint path to backend/render.staging.yaml
# Or duplicate the production service and change name + branch + env vars.
#
# Docs: docs/deployment/staging-environment.md

services:
  - type: web
    name: sikapa-backend-staging
    env: docker
    plan: starter
    branch: dev/staging
    rootDir: backend
    dockerfilePath: Dockerfile
    startCommand: ./docker-entrypoint.sh
    autoDeploy: true
    healthCheckPath: /health/ready
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: false
      - key: HTTPS_ENABLED
        value: false
      - key: UPLOAD_SERVE_LOCAL
        value: false
      - key: DISABLE_OPENAPI
        value: false
      - key: USE_CELERY
        value: false
      - key: CORS_ALLOW_CREDENTIALS
        value: true
      # Set in Render Dashboard (staging-only values — never copy production secrets):
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      # Optional: paste production DATABASE_URL here in Dashboard to block accidental reuse
      # - key: STAGING_FORBIDDEN_DATABASE_URL
      #   sync: false
