# After squash-merge dev/develop → dev/staging, realign dev/develop to dev/staging
# so both branches stay at the same commit level (avoids PR merge conflicts).
name: Sync staging to dev/develop

on:
  push:
    branches: [dev/staging]
  pull_request:
    types: [closed]
    branches: [dev/staging]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to reset dev/develop to dev/staging (force-with-lease)"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: sync-staging-to-dev-develop
  cancel-in-progress: false

jobs:
  sync:
    name: Reset dev/develop to dev/staging
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'dev/develop' &&
       github.event.pull_request.base.ref == 'dev/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm manual reset
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Manual sync aborted: set confirm to YES."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACTIONS_PR_TOKEN != '' && secrets.GH_ACTIONS_PR_TOKEN || github.token }}

      - name: Align dev/develop with dev/staging
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN != '' && secrets.GH_ACTIONS_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git fetch origin dev/staging dev/develop

          STAGING_SHA="$(git rev-parse origin/dev/staging)"
          DEV_SHA="$(git rev-parse origin/dev/develop)"

          if [ "${STAGING_SHA}" = "${DEV_SHA}" ]; then
            echo "dev/develop already matches dev/staging (${STAGING_SHA})."
            exit 0
          fi

          echo "Resetting dev/develop (${DEV_SHA}) to dev/staging (${STAGING_SHA})."
          git checkout -B dev/develop origin/dev/staging
          git push origin dev/develop --force-with-lease
