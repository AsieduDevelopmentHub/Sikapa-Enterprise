# Syncs the frontend branch into main via PR. Kept separate from CI so pushes to
# main are not blocked when the repo token policy only allows contents:read.
name: Frontend auto PR to main

on:
  push:
    branches: [frontend]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-auto-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-pr-merge:
    name: Auto PR + auto-merge (frontend → main)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if git fetch origin main --depth=1 >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count origin/main..HEAD || echo 0)
            if [ "${AHEAD}" = "0" ]; then
              echo "frontend is not ahead of main — skipping auto-PR."
              exit 0
            fi
          fi

          PR_NUM=$(gh pr list --head frontend --base main --state open \
            --json number --jq '.[0].number // empty' || true)

          if [ -z "${PR_NUM}" ]; then
            PR_URL=$(gh pr create --base main --head frontend \
              --title "chore: sync frontend branch into main" \
              --body "Auto-generated PR after CI passed on \`frontend\`." \
              2>/dev/null || true)
            PR_NUM="${PR_URL##*/}"
            if ! [[ "${PR_NUM}" =~ ^[0-9]+$ ]]; then
              PR_NUM=$(gh pr list --head frontend --base main --state open \
                --json number --jq '.[0].number // empty' || true)
            fi
          fi

          if [ -n "${PR_NUM}" ]; then
            echo "Enabling auto-merge for PR #${PR_NUM}"
            gh pr merge "${PR_NUM}" --auto --squash \
              || echo "Auto-merge unavailable — enable it in repo Settings or supply GH_ACTIONS_PR_TOKEN."
          else
            echo "No PR created or found — skipping auto-merge."
          fi
