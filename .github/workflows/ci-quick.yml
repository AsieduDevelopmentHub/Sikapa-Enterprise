# Fast gate on dev/develop (daily integration). Full CI runs on PRs to dev/staging and on
# pushes to dev/staging / main — see ci.yml.
name: CI Quick

on:
  push:
    branches: [dev/develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

concurrency:
  group: ci-quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quick:
    name: Backend (quick)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Verify API path sync
        run: python scripts/check_api_path_sync.py

      - name: Run backend tests (no coverage upload)
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-secret-key-for-testing-only
          RESEND_API_KEY: test-resend-api-key
          EMAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3000
          CORS_ORIGINS: http://localhost:3000
          EMAIL_ENABLED: "false"
          HTTPS_ENABLED: "false"
          DEBUG: "false"
          TESTING: "true"
          PAYSTACK_SECRET_KEY: ""
          API_RATE_LIMIT_ENABLED: "false"
        run: python -m pytest tests/ -q --tb=line --no-cov

  frontend-quick:
    name: Frontend (quick)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm test
