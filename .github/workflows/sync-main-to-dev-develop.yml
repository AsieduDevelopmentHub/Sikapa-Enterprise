# After a squash promote lands on main, realign dev/develop so the next auto-PR
# does not replay commits that are already on main (avoids recurring merge conflicts).
name: Sync main to dev/develop

on:
  push:
    branches: [main]
  # Squash merges via github-actions[bot] do not always fire a follow-up push
  # workflow; PR close is a reliable backup trigger.
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to reset dev/develop to main (force-with-lease)"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: sync-main-to-dev-develop
  cancel-in-progress: false

jobs:
  sync:
    name: Reset dev/develop to main
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'dev/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm manual reset
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Manual sync aborted: set confirm to YES in Run workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}

      - name: Align dev/develop with main
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git fetch origin main dev/develop

          MAIN_SHA="$(git rev-parse origin/main)"
          DEV_SHA="$(git rev-parse origin/dev/develop)"

          if [ "${MAIN_SHA}" = "${DEV_SHA}" ]; then
            echo "dev/develop already matches main (${MAIN_SHA})."
            exit 0
          fi

          echo "Resetting dev/develop (${DEV_SHA}) to main (${MAIN_SHA})."
          git checkout -B dev/develop origin/main
          git push origin dev/develop --force-with-lease
