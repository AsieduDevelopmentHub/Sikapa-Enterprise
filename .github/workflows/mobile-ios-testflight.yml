# Optional signed iOS build + TestFlight upload.
# Requires repository secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD
#   APPLE_PROVISIONING_PROFILE_BASE64
#   APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY_BASE64
#
# Until secrets are configured, the job exits with a clear skip message.
# Unsigned IPA builds still run on mobile-v* tags via mobile-build.yml.

name: Mobile iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "Override SIKAPA_API_BASE dart-define"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  testflight:
    name: Build signed IPA and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Check signing secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping TestFlight — set APPLE_CERTIFICATE_BASE64 and related secrets to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when secrets missing
        if: steps.secrets.outputs.configured != 'true'
        run: exit 0

      - name: Checkout repository
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Flutter
        if: steps.secrets.outputs.configured == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        working-directory: mobile
        run: flutter pub get

      - name: Import signing certificate
        if: steps.secrets.outputs.configured == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign

      - name: Install provisioning profile
        if: steps.secrets.outputs.configured == 'true'
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/sikapa.mobileprovision

      - name: Build signed IPA
        if: steps.secrets.outputs.configured == 'true'
        working-directory: mobile
        env:
          API_BASE: ${{ inputs.api_base || vars.MOBILE_API_BASE }}
        run: |
          set -euo pipefail
          DEFINES=()
          if [ -n "${API_BASE}" ]; then
            DEFINES+=("--dart-define=SIKAPA_API_BASE=${API_BASE}")
          fi
          flutter build ipa --release "${DEFINES[@]}"

      - name: Upload to TestFlight
        if: steps.secrets.outputs.configured == 'true'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: mobile/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
