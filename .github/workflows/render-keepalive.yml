# Pings the Render backend so a free-tier instance stays warm (optional).
#
# Why you might see "0 workflow runs":
#   - schedule (cron) only creates a run at the next tick (e.g. up to 5 min after merge),
#     and history stays empty until then.
#   - workflow_dispatch only appears after you click "Run workflow" once.
#
# This file also triggers on push when THIS workflow changes on the default branch,
# so merging an update gives you an immediate run in the Actions tab.
#
# Scheduled workflows only run from the repository DEFAULT branch (Settings → General).
# Actions must be enabled: Settings → Actions → General.

name: Render keepalive

run-name: "Render keepalive (${{ github.event_name }})"

on:
  schedule:
    # Every 5 minutes UTC (adjust to reduce noise)
    - cron: "*/5 * * * *"
  workflow_dispatch:
  # Immediate run when this workflow file is updated on main integration branches
  push:
    branches:
      - main
      - frontend
      - backend
    paths:
      - ".github/workflows/render-keepalive.yml"

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Sikapa backend on Render
        env:
          BACKEND_URL: https://sikapa-backend.onrender.com
        run: |
          set -e
          for path in /health /; do
            if curl -fsS -o /dev/null \
              --connect-timeout 25 \
              --max-time 55 \
              "${BACKEND_URL}${path}"; then
              echo "OK: ${BACKEND_URL}${path}"
              exit 0
            fi
          done
          echo "Ping failed for both /health and /"
          exit 1
