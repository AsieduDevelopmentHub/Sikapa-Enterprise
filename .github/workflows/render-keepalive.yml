# This workflow hits /health (falls back to /) every 5 minutes.

name: Render keepalive

on:
  schedule:
    # Every 5 minutes (UTC). Adjust if you want fewer pings.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Sikapa backend on Render
        env:
          BACKEND_URL: https://sikapa-backend.onrender.com
        run: |
          set -e
          for path in /health /; do
            if curl -fsS -o /dev/null \
              --connect-timeout 25 \
              --max-time 55 \
              "${BACKEND_URL}${path}"; then
              echo "OK: ${BACKEND_URL}${path}"
              exit 0
            fi
          done
          echo "Ping failed for both /health and /"
          exit 1
