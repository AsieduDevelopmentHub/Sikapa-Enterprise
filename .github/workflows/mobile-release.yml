# Publishes GitHub Releases for mobile-v* tags after Mobile CI/CD Pipeline succeeds.
# Kept separate so routine pushes do not declare contents:write (startup_failure).
name: Mobile release publish

on:
  workflow_run:
    workflows: [Mobile CI/CD Pipeline]
    types: [completed]

permissions:
  contents: read

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'mobile-v')
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: android-${{ github.event.workflow_run.run_number }}
          path: dist/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ios-${{ github.event.workflow_run.run_number }}
          path: dist/ios

      - name: Verify release files
        run: |
          ls -la dist/android
          ls -la dist/ios

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          name: Sikapa Mobile ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/android/*
            dist/ios/*
