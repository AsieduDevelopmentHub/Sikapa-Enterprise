name: Mobile release publish

# Manual fallback when a tag build succeeded but release publish did not run.
# Normal releases: publish_release job in mobile-build.yml (same workflow as the build).

on:
  workflow_dispatch:
    inputs:
      workflow_run_id:
        description: "Actions run ID from the URL (e.g. 26375742006)"
        required: true
        type: string
      artifact_run_number:
        description: "Run # from that workflow (artifact name android-N)"
        required: true
        type: string
      tag_name:
        description: "Git tag (e.g. mobile-v1.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Publish GitHub Release (manual)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.workflow_run_id }}
          name: android-${{ inputs.artifact_run_number }}
          path: dist/android

      - name: Download iOS artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.workflow_run_id }}
          name: ios-${{ inputs.artifact_run_number }}
          path: dist/ios

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name }}
          name: Sikapa Mobile ${{ inputs.tag_name }}
          generate_release_notes: false
          fail_on_unmatched_files: false
          body: |
            Sikapa Mobile release (Android APK/AAB; unsigned iOS IPA when available).

            Published manually from workflow run ${{ inputs.workflow_run_id }}.
          files: |
            dist/android/**
            dist/ios/**
