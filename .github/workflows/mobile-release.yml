name: Mobile release publish

on:
  workflow_run:
    workflows: [Mobile CI/CD Pipeline]
    types: [completed]

permissions:
  contents: read

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'mobile-v')

    permissions:
      contents: write
      actions: read

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: android-${{ github.event.workflow_run.run_number }}
          path: dist/android

      # Optional iOS download
      - name: Download iOS artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ios-${{ github.event.workflow_run.run_number }}
          path: dist/ios

      - name: Verify release files
        run: |
          echo "Android files:"
          ls -la dist/android || true

          echo "iOS files:"
          ls -la dist/ios || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          name: Sikapa Mobile ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/android/**
            dist/ios/**