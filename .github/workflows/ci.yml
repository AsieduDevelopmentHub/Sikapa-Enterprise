name: CI

on:
  push:
    branches:
      - main
      - frontend
      - backend
  pull_request:
    branches:
      - main
      - frontend
      - backend
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          # In-memory SQLite (no db directory required on the runner)
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-secret-key-for-testing-only
          JWT_SECRET_KEY: ci-jwt-secret-for-testing
          JWT_REFRESH_SECRET_KEY: ci-jwt-refresh-secret
          RESEND_API_KEY: test-resend-api-key
          EMAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3000
          EMAIL_ENABLED: false
          HTTPS_ENABLED: false
          DEBUG: false
          TESTING: true
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        # vitest.config.ts sets passWithNoTests; smoke test lives in __tests__/
        run: npm test

  # Uses GH_ACTIONS_PR_TOKEN when set (needed if org blocks GITHUB_TOKEN from opening PRs).
  # Otherwise falls back to github.token so `gh` is never invoked with an empty token.
  auto-pr-merge-frontend-to-main:
    name: Auto PR + Auto-merge (frontend -> main)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/frontend'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update PR from frontend to main
        id: cpr
        env:
          GH_TOKEN_DEFAULT: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_ACTIONS_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${GH_PAT:-}" ]; then
            export GH_TOKEN="${GH_PAT}"
          else
            export GH_TOKEN="${GH_TOKEN_DEFAULT}"
          fi
          PR_NUM=$(gh pr list --head frontend --base main --state open --json number --jq '.[0].number // empty')
          if [ -z "${PR_NUM}" ]; then
            {
              printf '%s\n' 'Auto-generated PR after CI passed on `frontend`.'
              printf '%s\n' ''
              printf '%s\n' '- Backend CI: passed'
              printf '%s\n' '- Frontend CI: passed'
            } > /tmp/pr-body.md
            gh pr create --base main --head frontend \
              --title "chore: sync frontend branch into main" \
              --body-file /tmp/pr-body.md
            PR_NUM=$(gh pr list --head frontend --base main --state open --json number --jq '.[0].number')
          fi
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Enable PR auto-merge (squash)
        if: ${{ steps.cpr.outputs.pr_number != '' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pr_number }}
          merge-method: squash
