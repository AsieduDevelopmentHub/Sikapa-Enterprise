name: CI

on:
  push:
    branches: [main, frontend, backend]
  pull_request:
    branches: [main, frontend, backend]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-secret-key-for-testing-only
          JWT_SECRET_KEY: ci-jwt-secret-for-testing
          JWT_REFRESH_SECRET_KEY: ci-jwt-refresh-secret
          RESEND_API_KEY: test-resend-api-key
          EMAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3000
          EMAIL_ENABLED: "false"
          HTTPS_ENABLED: "false"
          DEBUG: "false"
          TESTING: "true"
          PAYSTACK_SECRET_KEY: ""
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  auto-pr-merge-frontend-to-main:
    name: Auto PR + Auto-merge (frontend -> main)
    runs-on: ubuntu-latest
    # Never fail the overall CI workflow if gh/auto-merge isn’t available (missing PAT, permissions, etc.).
    continue-on-error: true
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/frontend'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR and enable auto-merge
        env:
          # Prefer a PAT with `repo` + `workflow` scope so the created PR can
          # actually re-trigger checks on `main`. Falls back to the built-in
          # token, which CAN open PRs but CANNOT auto-merge across branches.
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          # Nothing to do when `frontend` is not ahead of `main`.
          if git fetch origin main --depth=1 >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count origin/main..HEAD || echo 0)
            if [ "${AHEAD}" = "0" ]; then
              echo "frontend is not ahead of main — skipping auto-PR."
              exit 0
            fi
          fi

          PR_NUM=$(gh pr list --head frontend --base main --state open \
            --json number --jq '.[0].number // empty' || true)

          if [ -z "${PR_NUM}" ]; then
            # `gh pr create` prints the PR URL on stdout; parse the number from it.
            PR_URL=$(gh pr create --base main --head frontend \
              --title "chore: sync frontend branch into main" \
              --body  "Auto-generated PR after CI passed on \`frontend\`." \
              2>/dev/null || true)
            PR_NUM="${PR_URL##*/}"
            if ! [[ "${PR_NUM}" =~ ^[0-9]+$ ]]; then
              PR_NUM=$(gh pr list --head frontend --base main --state open \
                --json number --jq '.[0].number // empty' || true)
            fi
          fi

          if [ -n "${PR_NUM}" ]; then
            echo "Enabling auto-merge for PR #${PR_NUM}"
            gh pr merge "${PR_NUM}" --auto --squash \
              || echo "Auto-merge unavailable — enable it in repo Settings → General → Pull Requests, or supply GH_ACTIONS_PR_TOKEN."
          else
            echo "No PR created or found — skipping auto-merge."
          fi
