name: CI

on:
  push:
    branches:
      - main
      - master
      - backend
  pull_request:
    branches:
      - main
      - master
      - backend
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    environment:
      name: CI
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          # In-memory SQLite (no db directory required on the runner)
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: ci-secret-key-for-testing-only
          JWT_SECRET_KEY: ci-jwt-secret-for-testing
          JWT_REFRESH_SECRET_KEY: ci-jwt-refresh-secret
          RESEND_API_KEY: test-resend-api-key
          EMAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3000
          EMAIL_ENABLED: false
          HTTPS_ENABLED: false
          DEBUG: false
          TESTING: true
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    environment:
      name: CI
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests
