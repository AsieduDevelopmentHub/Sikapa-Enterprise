name: CI

on:
  push:
    branches: [main, dev/develop, dev/staging]
  pull_request:
    branches: [main, dev/develop, dev/staging]
  workflow_dispatch:

# Keep workflow-level permissions minimal (matches actions-smoke.yml). Jobs that
# need cache or elevated scopes declare them per-job — extra scopes here can
# cause startup_failure when the repo GITHUB_TOKEN policy is read-only.
permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Avoid canceling in-flight runs on rapid pushes (can surface as startup_failure).
  cancel-in-progress: false

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pip-audit ruff

      - name: Ruff lint (backend)
        working-directory: backend
        run: ruff check app tests

      - name: Verify API path sync (web vs mobile)
        run: python scripts/check_api_path_sync.py

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-secret-key-for-testing-only
          RESEND_API_KEY: test-resend-api-key
          EMAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3000
          CORS_ORIGINS: http://localhost:3000
          EMAIL_ENABLED: "false"
          HTTPS_ENABLED: "false"
          DEBUG: "false"
          TESTING: "true"
          PAYSTACK_SECRET_KEY: ""
          API_RATE_LIMIT_ENABLED: "false"
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx', 'frontend/**/*.js', 'frontend/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: frontend
        # Advisory until Next.js/postcss upstream CVEs are patched (see executive-summary #4).
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  mobile:
    name: Mobile CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Verify formatting
        working-directory: mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        working-directory: mobile
        run: flutter analyze --no-pub

      - name: Run unit tests
        working-directory: mobile
        run: flutter test
