name: Lighthouse

# Runs Lighthouse against the production build on every PR touching the frontend.
# Uses Lighthouse CI in `assert: off` mode so scores are reported but never fail the job.
# Promote individual categories to `error` in `frontend/lighthouserc.json` once budgets are
# comfortable.

on:
  pull_request:
    branches: [main, frontend]
    paths:
      - "frontend/**"
      - ".github/workflows/lighthouse.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        working-directory: frontend
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: lhci autorun --config=./lighthouserc.json
