# Opens (or updates) a PR from dev/develop → main after staging pushes.
# A new PR is created only when dev/develop is at least 10 commits ahead of main.
# Kept separate from CI so main pushes are not blocked when the repo token
# policy only allows contents:read on the default workflow token.
name: Dev develop auto PR to main

on:
  push:
    branches: [dev/develop]
  workflow_dispatch:
    inputs:
      min_commits:
        description: "Minimum commits ahead of main before opening a new PR"
        required: false
        default: "10"
      trigger_sync:
        description: "After this job, run Sync main to dev/develop (use when main is already updated)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: dev-develop-auto-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-pr-merge:
    name: Auto PR + auto-merge (dev/develop → main)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
          MIN_COMMITS: ${{ github.event.inputs.min_commits || '10' }}
        run: |
          set -euo pipefail

          git fetch origin main --depth=1 >/dev/null 2>&1 || true
          AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          echo "dev/develop is ${AHEAD} commit(s) ahead of main (minimum for new PR: ${MIN_COMMITS})."

          if [ "${AHEAD}" = "0" ]; then
            echo "dev/develop is not ahead of main — skipping auto-PR."
            exit 0
          fi

          PR_NUM=$(gh pr list --head dev/develop --base main --state open \
            --json number --jq '.[0].number // empty' || true)

          if [ -z "${PR_NUM}" ] && [ "${AHEAD}" -lt "${MIN_COMMITS}" ]; then
            echo "Need at least ${MIN_COMMITS} commits ahead of main to open a new PR — skipping."
            exit 0
          fi

          if [ -z "${PR_NUM}" ]; then
            PR_URL=$(gh pr create --base main --head dev/develop \
              --title "chore: promote dev/develop to main" \
              --body "Auto-generated PR: \`dev/develop\` is ${AHEAD} commit(s) ahead of \`main\`." \
              2>/dev/null || true)
            PR_NUM="${PR_URL##*/}"
            if ! [[ "${PR_NUM}" =~ ^[0-9]+$ ]]; then
              PR_NUM=$(gh pr list --head dev/develop --base main --state open \
                --json number --jq '.[0].number // empty' || true)
            fi
          fi

          if [ -n "${PR_NUM}" ]; then
            echo "Enabling auto-merge for PR #${PR_NUM}"
            gh pr merge "${PR_NUM}" --auto --squash \
              || echo "Auto-merge unavailable — enable it in repo Settings or supply GH_ACTIONS_PR_TOKEN."
          else
            echo "No PR created or found — skipping auto-merge."
          fi

      - name: Dispatch sync main to dev/develop
        if: github.event_name == 'workflow_dispatch' && inputs.trigger_sync == true
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          echo "Dispatching Sync main to dev/develop..."
          gh workflow run sync-main-to-dev-develop.yml \
            --ref main \
            -f confirm=YES
          echo "Sync workflow queued. Check Actions → Sync main to dev/develop."
