# Manual promotion: dev/staging → main (production).
# Does NOT auto-merge. Use workflow_dispatch to open or refresh a PR only.
name: Promote staging to main (manual)

on:
  workflow_dispatch:
    inputs:
      min_commits:
        description: "Minimum commits ahead of main before opening a new PR"
        required: false
        default: "1"

permissions:
  contents: read

concurrency:
  group: dev-staging-promote-main
  cancel-in-progress: false

jobs:
  open-pr:
    name: Open PR only (dev/staging → main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or refresh promotion PR (no auto-merge)
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PR_TOKEN || github.token }}
          MIN_COMMITS: ${{ github.event.inputs.min_commits || '1' }}
        run: |
          set -euo pipefail

          git fetch origin main dev/staging --depth=1 >/dev/null 2>&1 || true
          AHEAD=$(git rev-list --count origin/main..origin/dev/staging 2>/dev/null || echo 0)
          echo "dev/staging is ${AHEAD} commit(s) ahead of main (minimum for new PR: ${MIN_COMMITS})."

          if [ "${AHEAD}" = "0" ]; then
            echo "dev/staging is not ahead of main — nothing to promote."
            exit 0
          fi

          PR_NUM=$(gh pr list --head dev/staging --base main --state open \
            --json number --jq '.[0].number // empty' || true)

          if [ -n "${PR_NUM}" ]; then
            echo "Open promotion PR already exists: #${PR_NUM}"
            gh pr view "${PR_NUM}" --web 2>/dev/null || true
            exit 0
          fi

          if [ "${AHEAD}" -lt "${MIN_COMMITS}" ]; then
            echo "Need at least ${MIN_COMMITS} commit(s) ahead of main to open a new PR."
            exit 0
          fi

          gh pr create --base main --head dev/staging \
            --title "chore: promote dev/staging to main (production)" \
            --body "Manual production promotion from hosted staging.

- Merge this PR in GitHub when QA and pre-go-live tests pass on \`dev/staging\`.
- After merge, \`sync-main-to-integration.yml\` resets \`dev/develop\` and \`dev/staging\` to \`main\`.
- Do not use \`dev/develop\` → \`main\` PRs; staging is the promotion path."

          echo "PR created. Review and merge manually in GitHub (no auto-merge)."
