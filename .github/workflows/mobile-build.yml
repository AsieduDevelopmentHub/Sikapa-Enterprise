name: Mobile CI/CD Pipeline

# -----------------------------------------------------------------------------
# Flutter Mobile Build & Release Pipeline
# -----------------------------------------------------------------------------
#
# This workflow is responsible for:
#
#   • Validating Flutter mobile code quality
#   • Running static analysis and tests
#   • Building Android release artifacts
#   • Building unsigned iOS artifacts
#   • Uploading downloadable workflow artifacts
#   • Publishing tagged production releases automatically
#
# Supported Platforms:
#   - Android (APK + AAB)
#   - iOS (Unsigned IPA)
#
# -----------------------------------------------------------------------------
# Release Strategy
# -----------------------------------------------------------------------------
#
# Normal Pushes:
#   - Runs validation and build checks
#   - Uploads artifacts to GitHub Actions
#
# Tagged Releases:
#   - Tags matching `mobile-v*`
#   - Automatically creates a GitHub Release
#   - Attaches all generated artifacts
#
# Example:
#   git tag mobile-v1.0.0
#   git push origin mobile-v1.0.0
#
# -----------------------------------------------------------------------------
# Runtime Configuration
# -----------------------------------------------------------------------------
#
# Recommended Repository Variables:
#
#   MOBILE_API_BASE
#   MOBILE_GOOGLE_OAUTH_ENABLED
#
# Configure them here:
# GitHub → Settings → Secrets and variables → Actions
#
# These values may also be overridden manually using workflow_dispatch.
#
# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
#
# iOS builds are generated unsigned intentionally.
# This keeps the CI pipeline lightweight while still validating
# Flutter iOS build integrity.
#
# Proper Apple signing and TestFlight deployment can be integrated later.
# -----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "Override the mobile API base URL"
        required: false
        default: ""

      google_oauth_enabled:
        description: "Enable or disable Google OAuth support"
        required: false
        default: ""

  push:
    branches:
      - main
      - mobile

    tags:
      - "mobile-v*"

    paths:
      - "mobile/**"
      - ".github/workflows/mobile-build.yml"

permissions:
  contents: write

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Must match mobile/README.md (Flutter 3.41+ / Dart ^3.11.5 in pubspec.yaml).
  FLUTTER_VERSION: "3.41.0"
  FLUTTER_CHANNEL: stable
  WORKING_DIR: mobile

# -----------------------------------------------------------------------------
# Android Build Job
# -----------------------------------------------------------------------------

jobs:
  android:
    name: Android Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # -----------------------------------------------------------------------
      # Repository Setup
      # -----------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Java Setup
      # -----------------------------------------------------------------------

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -----------------------------------------------------------------------
      # Flutter Setup
      # -----------------------------------------------------------------------

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      # -----------------------------------------------------------------------
      # Gradle Caching
      # -----------------------------------------------------------------------

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -----------------------------------------------------------------------
      # Resolve Runtime Defines
      # -----------------------------------------------------------------------

      - name: Resolve runtime configuration
        id: runtime
        shell: bash
        run: |
          API_BASE="${{ github.event.inputs.api_base }}"
          if [ -z "$API_BASE" ]; then
            API_BASE="${{ vars.MOBILE_API_BASE }}"
          fi

          OAUTH="${{ github.event.inputs.google_oauth_enabled }}"
          if [ -z "$OAUTH" ]; then
            OAUTH="${{ vars.MOBILE_GOOGLE_OAUTH_ENABLED }}"
          fi

          echo "api_base=$API_BASE" >> "$GITHUB_OUTPUT"
          echo "oauth=$OAUTH" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Flutter Environment Verification
      # -----------------------------------------------------------------------

      - name: Flutter version
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter --version

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      # -----------------------------------------------------------------------
      # Code Quality Checks
      # -----------------------------------------------------------------------

      - name: Verify formatting
        working-directory: ${{ env.WORKING_DIR }}
        run: dart format --output=none --set-exit-if-changed .

      - name: Run static analysis
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze --no-pub

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter test

      # -----------------------------------------------------------------------
      # Android Release Build
      # -----------------------------------------------------------------------

      - name: Build Android artifacts
        working-directory: ${{ env.WORKING_DIR }}
        env:
          API_BASE: ${{ steps.runtime.outputs.api_base }}
          OAUTH: ${{ steps.runtime.outputs.oauth }}
        run: |
          set -euo pipefail

          DEFINES=()

          if [ -n "${API_BASE}" ]; then
            DEFINES+=("--dart-define=SIKAPA_API_BASE=${API_BASE}")
          fi

          if [ -n "${OAUTH}" ]; then
            DEFINES+=("--dart-define=SIKAPA_GOOGLE_OAUTH_ENABLED=${OAUTH}")
          fi

          run_flutter_build() {
            if [ "${#DEFINES[@]}" -gt 0 ]; then
              flutter "$@" "${DEFINES[@]}"
            else
              flutter "$@"
            fi
          }

          run_flutter_build build apk \
            --release \
            --build-number=${{ github.run_number }}

          run_flutter_build build apk \
            --release \
            --split-per-abi \
            --build-number=${{ github.run_number }}

          run_flutter_build build appbundle \
            --release \
            --build-number=${{ github.run_number }}

      # -----------------------------------------------------------------------
      # Stage Artifacts
      # -----------------------------------------------------------------------

      - name: Prepare Android artifacts
        run: |
          set -euo pipefail

          mkdir -p artifacts/android

          cp -v mobile/build/app/outputs/flutter-apk/*.apk \
            artifacts/android/

          cp -v mobile/build/app/outputs/bundle/release/*.aab \
            artifacts/android/

          ls -la artifacts/android

      # -----------------------------------------------------------------------
      # Upload Artifacts
      # -----------------------------------------------------------------------

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ github.run_number }}
          path: artifacts/android/**
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # iOS Build Job
  # ---------------------------------------------------------------------------

  ios:
    name: iOS Release Build
    # macOS runners often show GitHub "startup failure" when minutes are exhausted or
    # the queue is full (common on free/private repos). Run iOS only for releases and
    # manual dispatch; Android still validates every push to main/mobile.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/mobile-v')
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Resolve runtime configuration
        id: runtime
        shell: bash
        run: |
          API_BASE="${{ github.event.inputs.api_base }}"
          if [ -z "$API_BASE" ]; then
            API_BASE="${{ vars.MOBILE_API_BASE }}"
          fi

          OAUTH="${{ github.event.inputs.google_oauth_enabled }}"
          if [ -z "$OAUTH" ]; then
            OAUTH="${{ vars.MOBILE_GOOGLE_OAUTH_ENABLED }}"
          fi

          echo "api_base=$API_BASE" >> "$GITHUB_OUTPUT"
          echo "oauth=$OAUTH" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      - name: Run static analysis
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter analyze --no-pub

      - name: Build unsigned iOS release
        working-directory: ${{ env.WORKING_DIR }}
        env:
          API_BASE: ${{ steps.runtime.outputs.api_base }}
          OAUTH: ${{ steps.runtime.outputs.oauth }}
        run: |
          set -euo pipefail

          DEFINES=()

          if [ -n "${API_BASE}" ]; then
            DEFINES+=("--dart-define=SIKAPA_API_BASE=${API_BASE}")
          fi

          if [ -n "${OAUTH}" ]; then
            DEFINES+=("--dart-define=SIKAPA_GOOGLE_OAUTH_ENABLED=${OAUTH}")
          fi

          if [ "${#DEFINES[@]}" -gt 0 ]; then
            flutter build ios \
              --release \
              --no-codesign \
              --build-number=${{ github.run_number }} \
              "${DEFINES[@]}"
          else
            flutter build ios \
              --release \
              --no-codesign \
              --build-number=${{ github.run_number }}
          fi

      - name: Package unsigned IPA
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euo pipefail

          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH" >&2
            exit 1
          fi

          rm -rf Payload
          mkdir Payload

          cp -R "$APP_PATH" Payload/

          mkdir -p ../artifacts/ios

          /usr/bin/zip -qr \
            "../artifacts/ios/sikapa-storefront-unsigned.ipa" \
            Payload

          ls -la ../artifacts/ios

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ github.run_number }}
          path: artifacts/ios/**
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # GitHub Release Job
  # ---------------------------------------------------------------------------

  release:
    name: Publish GitHub Release
    needs:
      - android
      - ios

    # Only on mobile release tags, and only when both platform jobs ran (not skipped).
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/mobile-v') &&
      needs.android.result == 'success' &&
      needs.ios.result == 'success'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-${{ github.run_number }}
          path: dist/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-${{ github.run_number }}
          path: dist/ios

      - name: Verify release files
        run: |
          ls -la dist/android
          ls -la dist/ios

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sikapa Mobile ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/android/*
            dist/ios/*