# -----------------------------------------------------------------------------
# Dart & Flutter Analyzer Configuration
# -----------------------------------------------------------------------------
#
# This file defines the static analysis and linting rules used throughout
# the project. The analyzer helps maintain clean, consistent, and reliable
# code by detecting errors, bad practices, and style issues early in
# development.
#
# Analyzer results are displayed directly in supported IDEs such as:
#   - VS Code
#   - Android Studio
#   - IntelliJ IDEA
#
# You can also run the analyzer manually with:
#
#   flutter analyze
#
# -----------------------------------------------------------------------------
# Base Lint Rules
# -----------------------------------------------------------------------------
#
# The Flutter lint package provides a solid set of recommended rules for
# Flutter applications, plugins, and packages. These rules encourage:
#
#   • Readable and maintainable code
#   • Consistent project structure
#   • Better performance practices
#   • Safer and cleaner development patterns
#
include: package:flutter_lints/flutter.yaml

# -----------------------------------------------------------------------------
# Custom Lint Configuration
# -----------------------------------------------------------------------------
#
# Additional lint rules can be enabled or disabled below depending on the
# project's coding standards and team preferences.
#
# Full lint documentation:
# https://dart.dev/lints
#
# Individual lint rules can also be ignored locally using:
#
#   // ignore: rule_name
#
# or for an entire file:
#
#   // ignore_for_file: rule_name
#
linter:
  rules:
    # -------------------------------------------------------------------------
    # Style Preferences
    # -------------------------------------------------------------------------

    # Encourages the use of single quotes for strings where possible.
    # prefer_single_quotes: true

    # Disables warnings for print statements during development.
    # Recommended to keep enabled in production-ready projects.
    # avoid_print: false

    # -------------------------------------------------------------------------
    # Recommended Additional Rules
    # -------------------------------------------------------------------------

    # Encourages proper typing instead of using dynamic unnecessarily.
    # always_declare_return_types: true

    # Helps maintain cleaner imports.
    # directives_ordering: true

    # Encourages final variables where reassignment is unnecessary.
    # prefer_final_locals: true

# -----------------------------------------------------------------------------
# Additional Resources
# -----------------------------------------------------------------------------
#
# Dart Analyzer Documentation:
# https://dart.dev/guides/language/analysis-options
#
# Flutter Lint Rules:
# https://dart.dev/lints
#
# -----------------------------------------------------------------------------