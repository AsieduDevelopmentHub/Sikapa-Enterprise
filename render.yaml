services:
  - type: web
    name: sikapa-backend
    env: docker
    plan: starter
    dockerfilePath: backend/Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
      - key: SECRET_KEY
      - key: CORS_ORIGINS
      - key: CORS_ALLOW_CREDENTIALS
